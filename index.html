<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#e7defb" />
  <title>Bunny Meadow</title>
  <meta name="description" content="A cozy marathon-training and nutrition tracker. Check off your day and collect bunnies." />

  <!-- PWA: installable from the home screen, no app store -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bunny Meadow" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Lock screen -->
  <div id="lock" class="lock">
    <div class="box">
      <div id="lock-art"></div>
      <h1>Bunny Meadow</h1>
      <p>A cozy place for your training days.<br />Enter the password to hop in.</p>
      <form id="lock-form" autocomplete="off">
        <input id="lock-input" type="password" inputmode="text" placeholder="password" aria-label="password" />
        <div id="lock-err" class="err"></div>
        <button class="btn" type="submit">Unlock</button>
      </form>
    </div>
  </div>

  <!-- App shell -->
  <div id="app" class="app hide">
    <div class="topbar">
      <div class="brand"><span id="brand-bunny"></span> Bunny Meadow</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <span id="clovers" class="clovers">0</span>
        <button id="settingsbtn" class="iconbtn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
        </button>
      </div>
    </div>
    <main id="view"></main>
  </div>

  <!-- Bottom nav (SVG icons) -->
  <nav id="nav" class="nav hide">
    <div class="app-inner">
      <button data-route="today" class="on" aria-label="Today">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="16" rx="3"/><path d="M3.5 9h17M8 3v3M16 3v3"/><path d="M8.5 14.5l2.2 2.2 4.3-4.6"/></svg></span>Today
      </button>
      <button data-route="plan" aria-label="Plan">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><path d="M3.5 9.5h17M8 3.5v3M16 3.5v3"/><path d="M7 13h4M7 16.5h7"/></svg></span>Plan
      </button>
      <button data-route="meadow" aria-label="Meadow">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 12c-2 0-3.5 1.8-3.5 4v.5h11V16c0-2.2-1.5-4-3.5-4"/><path d="M10 12c-.6-1-.4-2.4.3-4C11 6 10.7 4.5 10 3.8c-.2 1.6-1.2 2.6-1.8 3.8-.7 1.4-.5 3.4 1.8 4.4z"/><path d="M14 12c.6-1 .4-2.4-.3-4C13 6 13.3 4.5 14 3.8c.2 1.6 1.2 2.6 1.8 3.8.7 1.4.5 3.4-1.8 4.4z"/><circle cx="12" cy="18.5" r="1.6"/></svg></span>Meadow
      </button>
      <button data-route="dex" aria-label="Bunnydex">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4.5h9a3 3 0 0 1 3 3V20a2.2 2.2 0 0 0-2.2-2H5z"/><path d="M19 6.5V20"/><path d="M8.5 8.5h5M8.5 11.5h5"/></svg></span>Bunnydex
      </button>
      <button data-route="food" aria-label="Food">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v7a2.5 2.5 0 0 0 5 0V3M7.5 3v18"/><path d="M17.5 3c-1.7 0-3 2.2-3 5.5s1.3 4.5 3 4.5V3zm0 10v8"/></svg></span>Food
      </button>
    </div>
  </nav>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="meals.js"></script>
  <script src="bunnies.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
